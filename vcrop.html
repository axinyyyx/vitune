<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Time Clipper</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#121212;
    color:white;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

#search-box{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#1f1f1f;
    color:white;
    font-size:16px;
    margin-bottom:20px;
}

#status{
    text-align:center;
    margin-bottom:15px;
}

#results{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
}

.song-card{
    background:#1f1f1f;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.song-card:hover{
    transform:translateY(-5px);
}

.song-card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.song-card h3{
    font-size:15px;
    padding:10px;
}

.song-card p{
    color:#bdbdbd;
    font-size:13px;
    padding:0 10px 10px;
}

#time-modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-content{
    width:90%;
    max-width:450px;
    background:#1f1f1f;
    padding:20px;
    border-radius:15px;
}

.modal-content h3{
    margin-bottom:15px;
}

.time-display{
    margin-top:10px;
}

input[type=range]{
    width:100%;
}

button{
    border:none;
    cursor:pointer;
    padding:12px 20px;
    border-radius:8px;
}

#submit-time{
    background:#1db954;
    color:white;
}

#cancel-time{
    background:#444;
    color:white;
}

#output{
    display:none;
    margin-top:20px;
    background:#1f1f1f;
    padding:15px;
    border-radius:12px;
}

pre{
    white-space:pre-wrap;
    word-break:break-word;
}

#output-buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

#copy-btn{
    background:#2196f3;
    color:white;
}

#share-btn{
    background:#1db954;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<input
type="text"
id="search-box"
placeholder="Search Song..."
>

<div id="status"></div>

<div id="results"></div>

<div id="output">
<pre id="output-json"></pre>

<div id="output-buttons">
<button id="copy-btn">Copy JSON</button>
<button id="share-btn">Share</button>
</div>

</div>

</div>

<div id="time-modal">

<div class="modal-content">

<h3 id="song-title"></h3>

<p>Duration:
<span id="song-duration"></span>
</p>

<div class="time-display">
Start:
<span id="start-time">0:00</span>
</div>

<input
type="range"
id="start-slider"
value="0"
>

<div class="time-display">
End:
<span id="end-time">0:00</span>
</div>

<input
type="range"
id="end-slider"
value="0"
>

<br><br>

<button id="submit-time">
Submit
</button>

<button id="cancel-time">
Cancel
</button>

</div>

</div>

<script>

const SEARCH_URL =
"https://jio-saavan-api-three.vercel.app/api/search/songs?query=";

const DEFAULT_IMAGE =
"https://via.placeholder.com/300x300";

let selectedSong = null;

function debounce(func, wait){
    let timeout;
    return (...args)=>{
        clearTimeout(timeout);
        timeout=setTimeout(()=>func(...args),wait);
    };
}

$("#search-box").on(
"input",
debounce(function(){

    let query=$(this).val().trim();

    if(query.length<2){
        $("#results").html("");
        return;
    }

    searchSongs(query);

},400)
);

async function searchSongs(query){

    $("#status").text("Searching...");
    $("#results").html("");

    try{

        const res=await fetch(
            SEARCH_URL+
            encodeURIComponent(query)
        );

        const data=await res.json();

        console.log(data);

        const songs=
        data?.data?.results || [];

        if(!songs.length){

            $("#status").text("");

            $("#results").html(
                "<p>No Songs Found</p>"
            );

            return;
        }

        let html="";

        songs.forEach(song=>{

            const image=
            song.image?.[2]?.url ||
            song.image?.[1]?.url ||
            DEFAULT_IMAGE;

            const artist=
            song.artists?.primary
            ?.map(a=>a.name)
            .join(", ") ||
            "Unknown Artist";

            const audio=
            song.downloadUrl?.[4]?.url ||
            song.downloadUrl?.[0]?.url ||
            "";

            html+=`
            <div class="song-card"
            data-song='${JSON.stringify({
                name:song.name,
                artist:artist,
                duration:song.duration,
                url:audio
            })}'>

                <img src="${image}">

                <h3>${song.name}</h3>

                <p>${artist}</p>

                <p>${formatDuration(song.duration)}</p>

            </div>
            `;
        });

        $("#results").html(html);

        $("#status").text("");

        $(".song-card").click(function(){

            selectedSong=
            JSON.parse(
                $(this).attr("data-song")
            );

            openModal();
        });

    }catch(err){

        console.error(err);

        $("#status").text(
            "Failed To Load Songs"
        );
    }
}

function openModal(){

    $("#song-title").text(
        selectedSong.name
    );

    $("#song-duration").text(
        formatDuration(
            selectedSong.duration
        )
    );

    $("#start-slider")
    .attr(
        "max",
        selectedSong.duration
    )
    .val(0);

    $("#end-slider")
    .attr(
        "max",
        selectedSong.duration
    )
    .val(selectedSong.duration);

    $("#start-time").text("0:00");

    $("#end-time").text(
        formatDuration(
            selectedSong.duration
        )
    );

    $("#time-modal")
    .css("display","flex");
}

$("#cancel-time").click(function(){
    $("#time-modal").hide();
});

$("#start-slider").on(
"input",
function(){

    $("#start-time").text(
        formatDuration(this.value)
    );
});

$("#end-slider").on(
"input",
function(){

    $("#end-time").text(
        formatDuration(this.value)
    );
});

$("#submit-time").click(function(){

    let start=
    parseInt(
        $("#start-slider").val()
    );

    let end=
    parseInt(
        $("#end-slider").val()
    );

    if(end<=start){
        alert(
        "End time must be greater"
        );
        return;
    }

    const output={
        name:
        selectedSong.name+
        " - "+
        selectedSong.artist,

        url:
        selectedSong.url+
        `?start=${start}&end=${end}`
    };

    $("#output-json").text(
        JSON.stringify(
            output,
            null,
            4
        )
    );

    $("#output").show();

    $("#time-modal").hide();
});

$("#copy-btn").click(function(){

    navigator.clipboard.writeText(
        $("#output-json").text()
    );

    alert("Copied");
});

$("#share-btn").click(async function(){

    if(!navigator.share){
        alert(
        "Share not supported"
        );
        return;
    }

    const json=
    JSON.parse(
        $("#output-json").text()
    );

    await navigator.share({
        title:json.name,
        url:json.url
    });
});

function formatDuration(seconds){

    let min=
    Math.floor(seconds/60);

    let sec=
    Math.floor(seconds%60);

    return `${min}:${String(sec).padStart(2,'0')}`;
}

</script>

</body>
</html>
